<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - Qwen 2.5</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="header-info">
                <div class="ai-avatar">
                    <i class="fa-solid fa-robot"></i>
                </div>
                <div>
                    <h1>AI Assistant</h1>
                    <span class="status"><span class="status-dot"></span>Online - Qwen 2.5</span>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </header>
        
        <main class="chat-messages" id="chatBox">
            <div class="message ai-message">
                <div class="message-content">
                    <p>Hello! I am your AI assistant powered by Qwen 2.5. How can I help you today?</p>
                </div>
            </div>
        </main>

        <footer class="chat-input-area">
            <form id="chatForm">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Type your message here..." autocomplete="off" required>
                    <button type="submit" id="sendBtn" aria-label="Send message">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </form>
        </footer>
    </div>
    
    <script type="module" src="/main.js"></script>
</body>
</html>
